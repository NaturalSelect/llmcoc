version: "3.9"

services:
  llmcoc:
    build: .
    container_name: llmcoc
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      - coc_data:/app/data
      - ./config.yaml:/app/config.yaml:ro
      - ./scenarios:/app/scenarios:ro
    environment:
      - GIN_MODE=release
      # Override any config.yaml value via env:
      # - LLM_API_KEY=sk-...
      # - LLM_BASE_URL=https://api.openai.com/v1
      # - LLM_MODEL=gpt-4o
      # - JWT_SECRET=your-very-long-secret

volumes:
  coc_data:
    driver: local
